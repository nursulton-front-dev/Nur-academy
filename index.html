<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary SEO (Uzbek, latin) ─────────────────────────────────────
         These STATIC defaults are what crawlers that do NOT run JavaScript
         see — most importantly Telegram link previews, which read index.html
         for every shared URL. Per-page overrides happen client-side via the
         <Seo> component (picked up by Google, which renders JS). -->
    <title>Nur Academy — oʻqituvchilar uchun taʼlim platformasi</title>
    <meta
      name="description"
      content="Nur Academy — oʻqituvchilar uchun zamonaviy onlayn taʼlim platformasi: video darslar, testlar, mock imtihonlar va AI mentor. Birinchi kurs: informatika attestatsiyasiga tayyorgarlik."
    />
    <meta
      name="keywords"
      content="oʻqituvchilar uchun taʼlim platformasi, pedagoglar uchun onlayn kurslar, informatika oʻqituvchilari attestatsiya, attestatsiyaga tayyorgarlik, oʻqituvchi malaka oshirish Oʻzbekiston"
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://nuracademy.uz/" />

    <!-- ── Open Graph (Telegram / Facebook / LinkedIn previews) ─────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Nur Academy" />
    <meta property="og:locale" content="uz_UZ" />
    <meta property="og:title" content="Nur Academy — oʻqituvchilar uchun taʼlim platformasi" />
    <meta
      property="og:description"
      content="Oʻqituvchilar uchun zamonaviy onlayn taʼlim platformasi: video darslar, testlar va AI mentor. Birinchi kurs — informatika attestatsiyasiga tayyorgarlik."
    />
    <meta property="og:url" content="https://nuracademy.uz/" />
    <!-- Platform-level preview. A dedicated platform banner (1200x630) is still
         pending — export /og-cover.svg to PNG and swap this path once ready. -->
    <meta property="og:image" content="https://nuracademy.uz/images/dashboard-hero.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Nur Academy — oʻqituvchilar uchun taʼlim platformasi" />

    <!-- ── Twitter Card ─────────────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nur Academy — oʻqituvchilar uchun taʼlim platformasi" />
    <meta name="twitter:description" content="Oʻqituvchilar uchun onlayn taʼlim platformasi: video darslar, testlar va AI mentor. Birinchi kurs — informatika attestatsiyasi." />
    <meta name="twitter:image" content="https://nuracademy.uz/images/dashboard-hero.png" />

    <!-- ── Google Search Console verification ───────────────────────────────
         Replace the content value with the token GSC gives you (or use the
         DNS / HTML-file method instead — see notes). -->
    <meta name="google-site-verification" content="ODfMewIQXnCjoUYDidCx4gwRw8k5Px0dyoXEDy90-EE" />

    <!-- ── Yandex Webmaster verification (optional) ─────────────────────── -->
    <!-- <meta name="yandex-verification" content="REPLACE_WITH_YANDEX_TOKEN" /> -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
