<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background glow -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="monitorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>
  <circle cx="200" cy="150" r="140" fill="url(#glow)"/>
  <!-- Monitor -->
  <rect x="95" y="50" width="210" height="140" rx="12" fill="url(#monitorGrad)" stroke="#334155" stroke-width="2"/>
  <rect x="105" y="60" width="190" height="115" rx="6" fill="#0F172A"/>
  <!-- Screen content - code lines -->
  <rect x="118" y="75" width="80" height="4" rx="2" fill="#3B82F6" opacity="0.8"/>
  <rect x="118" y="85" width="120" height="4" rx="2" fill="#6366F1" opacity="0.6"/>
  <rect x="118" y="95" width="60" height="4" rx="2" fill="#8B5CF6" opacity="0.5"/>
  <rect x="118" y="105" width="100" height="4" rx="2" fill="#22C55E" opacity="0.6"/>
  <rect x="118" y="115" width="70" height="4" rx="2" fill="#F59E0B" opacity="0.5"/>
  <rect x="118" y="125" width="90" height="4" rx="2" fill="#3B82F6" opacity="0.4"/>
  <rect x="118" y="135" width="50" height="4" rx="2" fill="#EF4444" opacity="0.4"/>
  <!-- Code brackets on screen -->
  <text x="210" y="100" font-family="monospace" font-size="28" fill="#6366F1" opacity="0.3">&lt;/&gt;</text>
  <!-- Monitor stand -->
  <rect x="180" y="190" width="40" height="15" rx="2" fill="#1E293B"/>
  <rect x="160" y="205" width="80" height="8" rx="4" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <!-- Book -->
  <g transform="translate(50, 160)">
    <rect x="0" y="0" width="50" height="40" rx="4" fill="#3B82F6" opacity="0.9"/>
    <rect x="2" y="2" width="46" height="36" rx="3" fill="#1E40AF" opacity="0.3"/>
    <line x1="25" y1="5" x2="25" y2="35" stroke="#60A5FA" stroke-width="1" opacity="0.5"/>
    <rect x="6" y="10" width="14" height="2" rx="1" fill="#93C5FD" opacity="0.6"/>
    <rect x="6" y="16" width="12" height="2" rx="1" fill="#93C5FD" opacity="0.4"/>
    <rect x="6" y="22" width="14" height="2" rx="1" fill="#93C5FD" opacity="0.5"/>
    <rect x="30" y="10" width="14" height="2" rx="1" fill="#93C5FD" opacity="0.6"/>
    <rect x="30" y="16" width="10" height="2" rx="1" fill="#93C5FD" opacity="0.4"/>
    <rect x="30" y="22" width="14" height="2" rx="1" fill="#93C5FD" opacity="0.5"/>
  </g>
  <!-- Graduation cap -->
  <g transform="translate(300, 40)">
    <polygon points="25,0 50,12 25,24 0,12" fill="#F59E0B" opacity="0.9"/>
    <rect x="22" y="12" width="6" height="14" rx="1" fill="#D97706" opacity="0.8"/>
    <line x1="50" y1="12" x2="50" y2="32" stroke="#D97706" stroke-width="1.5" opacity="0.7"/>
    <circle cx="50" cy="34" r="3" fill="#F59E0B" opacity="0.8"/>
    <rect x="10" y="14" width="30" height="4" rx="2" fill="#92400E" opacity="0.5"/>
  </g>
  <!-- Floating elements -->
  <circle cx="80" cy="80" r="6" fill="#22C55E" opacity="0.6"/>
  <circle cx="330" cy="200" r="5" fill="#F59E0B" opacity="0.5"/>
  <circle cx="350" cy="100" r="4" fill="#8B5CF6" opacity="0.4"/>
  <circle cx="60" cy="130" r="3" fill="#3B82F6" opacity="0.5"/>
  <!-- Shield/Security icon -->
  <g transform="translate(320, 170)">
    <path d="M15 0 L30 8 L30 20 C30 28 22 34 15 36 C8 34 0 28 0 20 L0 8 Z" fill="#22C55E" opacity="0.7"/>
    <path d="M12 18 L15 22 L22 14" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
